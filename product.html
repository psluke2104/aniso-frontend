<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="brand_assets/favicon.png" type="image/png">
  <title>Product — ANISO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cocoa: '#8B6147', blush: '#E8B4A0', champagne: '#D4B896' },
          fontFamily: { display: ['Playfair Display', 'Georgia', 'serif'], body: ['Montserrat', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .animate-scroll { animation: scroll 25s linear infinite; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-6px); } 40%,80% { transform: translateX(6px); } }
    .pdp-acc-item .pdp-acc-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .pdp-acc-item.open .pdp-acc-body { max-height: 300px; }
    .pdp-acc-item.open .pdp-acc-icon { transform: rotate(45deg); }
    .pdp-acc-icon { transition: transform 0.3s ease; }
  </style>
</head>
<body class="bg-white font-body text-gray-900">

  <div id="nav-mount"></div>

  <!-- Breadcrumb -->
  <div class="border-b border-gray-100 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3">
      <nav class="flex items-center gap-2 text-xs text-gray-500">
        <a href="index.html" class="hover:text-gray-900 transition-colors">Home</a>
        <span>&rsaquo;</span>
        <a href="shop.html" class="hover:text-gray-900 transition-colors">Shop</a>
        <span>&rsaquo;</span>
        <span class="text-gray-900" id="breadcrumbName">Product</span>
      </nav>
    </div>
  </div>

  <main>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 md:py-12">
      <div class="grid md:grid-cols-2 gap-8 md:gap-12" id="pdpContent">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Related Products -->
    <section class="py-12 md:py-16 bg-gray-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="flex items-end justify-between mb-8">
          <div>
            <p class="text-xs font-medium uppercase tracking-[0.15em] text-cocoa mb-2">You Might Also Love</p>
            <h2 class="font-display text-2xl">Complete the Set</h2>
          </div>
          <a href="shop.html" class="text-xs font-medium text-gray-600 hover:text-gray-900 tracking-wide transition-colors">View All &rarr;</a>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6" id="relatedGrid"></div>
      </div>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="js/product-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const product = getProductById(id);

      if (!product) {
        document.getElementById('pdpContent').innerHTML = '<div class="col-span-2 text-center py-16"><p class="font-display text-xl text-gray-500">Product not found</p><a href="shop.html" class="text-sm text-cocoa hover:underline mt-4 inline-block">Back to Shop</a></div>';
        return;
      }

      document.title = `${product.title} — ANISO`;
      document.getElementById('breadcrumbName').textContent = product.title;

      const badgeMap = {
        'new-arrival': { label: 'New', cls: 'bg-gray-900 text-white' },
        'bestseller': { label: 'Bestseller', cls: 'bg-cocoa text-white' },
        '100-cotton': { label: '100% Cotton', cls: 'bg-white/90 text-gray-900 backdrop-blur' },
      };
      const badges = product.tags.map(t => badgeMap[t] ? `<span class="text-[10px] font-medium tracking-wide px-2.5 py-1 rounded-sm ${badgeMap[t].cls}">${badgeMap[t].label}</span>` : '').filter(Boolean).join(' ');

      document.getElementById('pdpContent').innerHTML = `
        <!-- Gallery -->
        <div>
          <div class="relative rounded-lg overflow-hidden bg-gray-50">
            <img id="pdpMainImg" src="${product.images[0].src}" alt="${product.title}" class="w-full aspect-[3/4] object-cover">
            ${badges ? `<div class="absolute top-3 left-3 flex gap-1">${badges}</div>` : ''}
          </div>
          ${product.colors && product.colors.length > 1 ? `
          <div class="flex gap-2 mt-3">
            ${product.colors.filter(c => c.image).map((c, i) => `
              <button class="w-16 h-20 rounded border-2 overflow-hidden transition-colors ${i === 0 ? 'border-gray-900' : 'border-gray-200 hover:border-gray-400'}" onclick="document.getElementById('pdpMainImg').src='${c.image}';this.parentElement.querySelectorAll('button').forEach(b=>b.classList.replace('border-gray-900','border-gray-200'));this.classList.replace('border-gray-200','border-gray-900')">
                <img src="${c.image}" alt="${c.name}" class="w-full h-full object-cover">
              </button>`).join('')}
          </div>` : ''}
        </div>

        <!-- Product Info -->
        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wide mb-1">${product.category}</p>
          <h1 class="font-display text-2xl sm:text-3xl mb-3">${product.title}</h1>
          <p class="text-lg font-medium mb-4">₹${product.price.toLocaleString('en-IN')}</p>
          <p class="text-sm text-gray-600 leading-relaxed mb-6">${product.description}</p>

          <!-- Size Selector -->
          <div class="mb-6">
            <div class="flex items-center justify-between mb-3">
              <span class="text-xs font-medium uppercase tracking-wide">Select Size</span>
              <a href="size-guide.html" class="text-xs text-cocoa hover:underline">Size Guide &rarr;</a>
            </div>
            <div class="flex gap-2" id="sizeOptions">
              ${product.sizes.map(s => `<button class="size-btn w-12 h-10 text-xs font-medium border border-gray-200 rounded hover:border-gray-900 transition-colors">${s}</button>`).join('')}
            </div>
          </div>

          <!-- Colors -->
          ${product.colors && product.colors.length > 1 ? `
          <div class="mb-6">
            <span class="text-xs font-medium uppercase tracking-wide block mb-3">Colour</span>
            <div class="flex gap-2">
              ${product.colors.map((c, i) => `<span class="w-7 h-7 rounded-full border-2 cursor-pointer transition-colors ${i === 0 ? 'border-gray-900' : 'border-gray-200'}" style="background:${c.hex}" title="${c.name}"></span>`).join('')}
            </div>
          </div>` : ''}

          <!-- Quantity -->
          <div class="mb-6">
            <span class="text-xs font-medium uppercase tracking-wide block mb-3">Quantity</span>
            <div class="flex items-center border border-gray-200 rounded w-fit">
              <button class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 transition-colors" id="qtyMinus">&minus;</button>
              <input type="number" class="w-10 text-center text-sm font-medium outline-none bg-transparent" value="1" min="1" max="10" readonly id="qtyInput">
              <button class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 transition-colors" id="qtyPlus">&plus;</button>
            </div>
          </div>

          <!-- CTA -->
          <div class="space-y-3 mb-6">
            <button class="w-full bg-gray-900 text-white text-xs font-medium tracking-wider uppercase py-4 rounded hover:bg-gray-800 transition-colors" id="addToCartBtn">Add to Bag</button>
            <a href="checkout.html" class="block w-full text-center border border-gray-300 text-gray-700 text-xs font-medium tracking-wider uppercase py-4 rounded hover:border-gray-900 hover:text-gray-900 transition-colors">Buy Now</a>
          </div>

          <!-- Trust -->
          <div class="flex flex-col gap-2 py-4 border-t border-gray-100 text-xs text-gray-500">
            <div class="flex items-center gap-2">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 4v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
              Free shipping above ₹1,499
            </div>
            <div class="flex items-center gap-2">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.02"/></svg>
              14-day returns
            </div>
            <div class="flex items-center gap-2">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              Genuine quality
            </div>
          </div>

          <!-- Accordions -->
          <div class="border-t border-gray-100">
            <div class="pdp-acc-item open">
              <button class="pdp-acc-trigger w-full flex items-center justify-between py-4 text-sm font-medium text-gray-900">
                Fabric &amp; Feel
                <svg class="pdp-acc-icon text-gray-400" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="pdp-acc-body"><div class="pb-4 text-sm text-gray-600 leading-relaxed">
                <ul class="list-disc list-inside space-y-1">
                  <li>${product.material}</li>
                  <li>OEKO-TEX certified — skin-safe and breathable</li>
                  <li>Naturally temperature-regulating</li>
                  <li>Lightweight, cloud-like to the touch</li>
                </ul>
              </div></div>
            </div>
            <div class="pdp-acc-item border-t border-gray-100">
              <button class="pdp-acc-trigger w-full flex items-center justify-between py-4 text-sm font-medium text-gray-900">
                Fit Notes
                <svg class="pdp-acc-icon text-gray-400" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="pdp-acc-body"><div class="pb-4 text-sm text-gray-600 leading-relaxed">
                <ul class="list-disc list-inside space-y-1">
                  <li>Relaxed, fluid silhouette</li>
                  <li>Runs true to size</li>
                  <li>For a more relaxed fit, size up</li>
                </ul>
              </div></div>
            </div>
            <div class="pdp-acc-item border-t border-gray-100">
              <button class="pdp-acc-trigger w-full flex items-center justify-between py-4 text-sm font-medium text-gray-900">
                Shipping &amp; Returns
                <svg class="pdp-acc-icon text-gray-400" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <div class="pdp-acc-body"><div class="pb-4 text-sm text-gray-600 leading-relaxed">
                <ul class="list-disc list-inside space-y-1">
                  <li>Free shipping on orders above ₹1,499</li>
                  <li>Standard delivery: 4–7 business days</li>
                  <li>14-day hassle-free returns</li>
                </ul>
              </div></div>
            </div>
          </div>
        </div>`;

      // Size selector
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.size-btn').forEach(b => { b.classList.remove('bg-gray-900', 'text-white', 'border-gray-900'); b.classList.add('border-gray-200'); });
          btn.classList.add('bg-gray-900', 'text-white', 'border-gray-900');
          btn.classList.remove('border-gray-200');
        });
      });

      // Quantity
      const qtyInput = document.getElementById('qtyInput');
      document.getElementById('qtyMinus')?.addEventListener('click', () => { qtyInput.value = Math.max(1, parseInt(qtyInput.value) - 1); });
      document.getElementById('qtyPlus')?.addEventListener('click', () => { qtyInput.value = Math.min(10, parseInt(qtyInput.value) + 1); });

      // Add to cart
      document.getElementById('addToCartBtn')?.addEventListener('click', () => {
        const sizeEl = document.querySelector('.size-btn.bg-gray-900');
        if (!sizeEl) {
          const opts = document.querySelector('#sizeOptions');
          if (opts) { opts.style.animation = 'none'; opts.offsetHeight; opts.style.animation = 'shake 0.4s ease'; }
          return;
        }
        addToCart({
          id: product.id,
          name: product.title,
          price: product.price,
          image: product.images[0].src,
          category: product.category,
          size: sizeEl.textContent.trim(),
          qty: parseInt(qtyInput.value),
        });
      });

      // PDP accordions
      initPdpAcc();

      // Related products
      const related = PRODUCTS.filter(p => p.id !== product.id).slice(0, 3);
      const badgeMapLocal = {
        'new-arrival': { label: 'New', cls: 'bg-gray-900 text-white' },
        'bestseller': { label: 'Bestseller', cls: 'bg-cocoa text-white' },
      };
      document.getElementById('relatedGrid').innerHTML = related.map(p => {
        const badge = p.tags.find(t => badgeMapLocal[t]);
        const badgeHtml = badge && badgeMapLocal[badge] ? `<span class="absolute top-3 left-3 text-[10px] font-medium tracking-wide px-2.5 py-1 rounded-sm ${badgeMapLocal[badge].cls}">${badgeMapLocal[badge].label}</span>` : '';
        return `
        <div class="group">
          <a href="product.html?id=${p.id}" class="block relative overflow-hidden rounded-lg bg-gray-100 mb-3">
            <div class="aspect-[3/4] overflow-hidden">
              <img src="${p.images[0].src}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
            </div>
            ${badgeHtml}
            <div class="absolute inset-x-0 bottom-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <button class="w-full bg-white/95 backdrop-blur text-gray-900 text-xs font-medium py-2.5 rounded hover:bg-white transition-colors" onclick="event.preventDefault();addToCart({id:'${p.id}',name:'${p.title}',price:${p.price},image:'${p.images[0].src}',category:'${p.category}',size:'S'})">Add to Bag</button>
            </div>
          </a>
          <p class="text-[11px] text-gray-500 uppercase tracking-wide">${p.category}</p>
          <p class="text-sm font-medium text-gray-900 mt-0.5"><a href="product.html?id=${p.id}" class="hover:underline">${p.title}</a></p>
          <p class="text-sm text-gray-600 mt-0.5">₹${p.price.toLocaleString('en-IN')}</p>
        </div>`;
      }).join('');
    });
  </script>
</body>
</html>
