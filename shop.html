<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="brand_assets/favicon.png" type="image/png">
  <title>Shop All — ANISO</title>
  <meta name="description" content="Browse the complete ANISO collection. Premium satin sets, cotton nightsuits, and lounge sets.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cocoa: '#8B6147', blush: '#E8B4A0', champagne: '#D4B896' },
          fontFamily: { display: ['Playfair Display', 'Georgia', 'serif'], body: ['Montserrat', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .animate-scroll { animation: scroll 25s linear infinite; }
    .fabric-tag { max-width: 60px; overflow: hidden; white-space: nowrap; transition: max-width 0.35s cubic-bezier(0.22,1,0.36,1), padding 0.35s ease; }
    .fabric-tag:hover { max-width: 200px; padding-left: 8px; padding-right: 8px; }
  </style>
</head>
<body class="bg-white font-body text-gray-900">

  <div id="nav-mount"></div>

  <main>
    <!-- Shop Header -->
    <section class="bg-gray-50 py-10 md:py-14 border-b border-gray-100">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 text-center">
        <p class="text-xs font-medium uppercase tracking-[0.15em] text-cocoa mb-2">Spring '26 Collection</p>
        <h1 class="font-display text-3xl sm:text-4xl mb-3">The Collection</h1>
        <p class="text-sm text-gray-500 max-w-lg mx-auto">Dreamy nightsuits &amp; refined nightwear — each piece designed to make your softest hours feel like the most beautiful ones.</p>
      </div>
    </section>

    <!-- Category Tabs + Grid -->
    <section class="py-8 md:py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <!-- Tabs -->
        <div class="flex items-center justify-between mb-8 flex-wrap gap-4">
          <div class="flex gap-2 overflow-x-auto pb-1 -mx-1 px-1" id="categoryTabs">
            <button class="cat-tab active whitespace-nowrap text-xs font-medium tracking-wide px-4 py-2 rounded-full border transition-colors" data-cat="all">All</button>
            <button class="cat-tab whitespace-nowrap text-xs font-medium tracking-wide px-4 py-2 rounded-full border transition-colors" data-cat="satin">Satin Sets</button>
            <button class="cat-tab whitespace-nowrap text-xs font-medium tracking-wide px-4 py-2 rounded-full border transition-colors" data-cat="nightsuit">Nightsuits</button>
            <button class="cat-tab whitespace-nowrap text-xs font-medium tracking-wide px-4 py-2 rounded-full border transition-colors" data-cat="lounge">Lounge Sets</button>
          </div>
          <div class="flex items-center gap-4">
            <span class="text-xs text-gray-500" id="shopCount"></span>
            <select class="text-xs text-gray-700 border border-gray-200 rounded-lg px-3 py-2 outline-none bg-white" id="sortSelect">
              <option value="featured">Featured</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="newest">Newest</option>
            </select>
          </div>
        </div>

        <!-- Product Grid -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6" id="shopGrid"></div>

        <!-- No Results -->
        <div class="hidden text-center py-16" id="noResults">
          <p class="font-display text-lg text-gray-500 mb-4">No pieces found in this category.</p>
          <button onclick="filterShop('all')" class="border border-gray-300 text-gray-700 text-xs font-medium tracking-wider uppercase px-6 py-3 rounded hover:border-gray-900 hover:text-gray-900 transition-colors">View All</button>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="js/product-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script>
    const badgeMap = {
      'new-arrival': { label: 'New', cls: 'bg-gray-900 text-white' },
      'bestseller': { label: 'Bestseller', cls: 'bg-cocoa text-white' },
      'luxe': { label: 'LUXE', cls: 'bg-black text-champagne' },
      '100-cotton': { label: '100% Cotton', cls: 'bg-white/90 text-gray-900 backdrop-blur' },
      'sold-out': { label: 'Sold Out', cls: 'bg-gray-500 text-white' },
    };

    function renderCard(p) {
      const badges = p.tags.map(t => badgeMap[t] ? `<span class="text-[10px] font-medium tracking-wide px-2.5 py-1 rounded-sm ${badgeMap[t].cls}">${badgeMap[t].label}</span>` : '').filter(Boolean).slice(0, 2).join('');
      const soldOut = !p.availableForSale;
      return `
      <div class="group">
        <a href="product.html?id=${p.id}" class="block relative overflow-hidden rounded-lg bg-gray-100 mb-3">
          <div class="aspect-[3/4] overflow-hidden">
            <img src="${p.images[0].src}" alt="${p.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ${soldOut ? 'opacity-50 grayscale' : ''}" loading="lazy">
          </div>
          <div class="absolute top-3 left-3 flex flex-col gap-1.5">${badges}</div>
          ${p.material ? `<span class="fabric-tag absolute bottom-3 right-3 text-[9px] font-medium bg-white/80 backdrop-blur text-gray-700 px-1.5 py-0.5 rounded-full cursor-default z-[2]" title="${p.material}">${p.material.includes('Satin') ? 'Satin' : p.material.includes('Cotton') ? 'Cotton' : 'Fabric'}</span>` : ''}
          ${!soldOut ? `<div class="absolute inset-x-0 bottom-0 p-3 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            <button class="w-full bg-white/95 backdrop-blur text-gray-900 text-xs font-medium py-2.5 rounded hover:bg-white transition-colors" onclick="event.preventDefault();addToCart({id:'${p.id}',name:'${p.title}',price:${p.price},image:'${p.images[0].src}',category:'${p.category}',size:'S'})">Add to Bag</button>
          </div>` : ''}
        </a>
        <div class="px-0.5">
          <p class="text-[11px] text-gray-500 uppercase tracking-wide">${p.category} &middot; XS–XL</p>
          <p class="text-sm font-medium text-gray-900 mt-0.5"><a href="product.html?id=${p.id}" class="hover:underline">${p.title}</a></p>
          <p class="text-sm text-gray-600 mt-0.5">₹${p.price.toLocaleString('en-IN')}</p>
          ${p.colors && p.colors.length > 1 ? `<div class="flex gap-1.5 mt-2">${p.colors.map(c => `<span class="w-4 h-4 rounded-full border border-gray-200" style="background:${c.hex}" title="${c.name}"></span>`).join('')}</div>` : ''}
        </div>
      </div>`;
    }

    let currentCat = 'all';
    let currentSort = 'featured';

    function getFilteredProducts() {
      let products = currentCat === 'all' ? [...PRODUCTS] : PRODUCTS.filter(p => p.categorySlug === currentCat);
      if (currentSort === 'price-asc') products.sort((a, b) => a.price - b.price);
      else if (currentSort === 'price-desc') products.sort((a, b) => b.price - a.price);
      else if (currentSort === 'newest') products.sort((a, b) => (b.tags.includes('new-arrival') ? 1 : 0) - (a.tags.includes('new-arrival') ? 1 : 0));
      return products;
    }

    function renderShop() {
      const products = getFilteredProducts();
      const grid = document.getElementById('shopGrid');
      const noResults = document.getElementById('noResults');
      const count = document.getElementById('shopCount');

      if (grid) grid.innerHTML = products.map(renderCard).join('');
      if (noResults) noResults.classList.toggle('hidden', products.length > 0);
      if (count) count.textContent = `${products.length} Piece${products.length !== 1 ? 's' : ''}`;
    }

    function filterShop(cat) {
      currentCat = cat;
      document.querySelectorAll('.cat-tab').forEach(t => {
        const isActive = t.dataset.cat === cat;
        t.classList.toggle('bg-gray-900', isActive);
        t.classList.toggle('text-white', isActive);
        t.classList.toggle('border-gray-900', isActive);
        t.classList.toggle('border-gray-200', !isActive);
        t.classList.toggle('text-gray-700', !isActive);
        t.classList.toggle('hover:border-gray-400', !isActive);
        t.classList.toggle('active', isActive);
      });
      renderShop();
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Tab clicks
      document.querySelectorAll('.cat-tab').forEach(tab => {
        tab.addEventListener('click', () => filterShop(tab.dataset.cat));
      });

      // Sort
      document.getElementById('sortSelect')?.addEventListener('change', e => {
        currentSort = e.target.value;
        renderShop();
      });

      // URL param
      const params = new URLSearchParams(window.location.search);
      const cat = params.get('cat');
      filterShop(cat || 'all');
    });
  </script>
</body>
</html>
