<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="brand_assets/favicon.png" type="image/png">
  <title>Contact — ANISO</title>
  <meta name="description" content="Get in touch with ANISO. We're here to help with orders, sizing, returns, or anything else.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { cocoa: '#8B6147', blush: '#E8B4A0', champagne: '#D4B896' },
        fontFamily: { display: ['Playfair Display', 'Georgia', 'serif'], body: ['Montserrat', 'system-ui', 'sans-serif'] },
      }}
    }
  </script>
  <style>
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .animate-scroll { animation: scroll 25s linear infinite; }
  </style>
</head>
<body class="bg-white font-body text-gray-900">
  <div id="nav-mount"></div>

  <main class="py-16 md:py-24">
    <div class="max-w-3xl mx-auto px-4 sm:px-6">
      <div class="text-center mb-12 fade-in">
        <p class="text-xs font-medium uppercase tracking-[0.15em] text-cocoa mb-2">Get In Touch</p>
        <h1 class="font-display text-3xl sm:text-4xl mb-3">We'd love to hear from you</h1>
        <p class="text-sm text-gray-500">Questions about an order, sizing help, or just want to say hello? Drop us a note below.</p>
      </div>

      <div class="grid md:grid-cols-3 gap-6 mb-12 fade-in">
        <div class="bg-gray-50 rounded-lg p-6 text-center">
          <svg class="mx-auto mb-3 text-cocoa" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <h3 class="font-display text-sm mb-1">Email</h3>
          <p class="text-xs text-gray-500">care@aniso.in</p>
        </div>
        <div class="bg-gray-50 rounded-lg p-6 text-center">
          <svg class="mx-auto mb-3 text-cocoa" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
          <h3 class="font-display text-sm mb-1">WhatsApp</h3>
          <p class="text-xs text-gray-500">+91 98765 43210</p>
        </div>
        <div class="bg-gray-50 rounded-lg p-6 text-center">
          <svg class="mx-auto mb-3 text-cocoa" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>
          <h3 class="font-display text-sm mb-1">Hours</h3>
          <p class="text-xs text-gray-500">Mon–Sat, 10am–7pm IST</p>
        </div>
      </div>

      <form class="space-y-4 fade-in" onsubmit="event.preventDefault();alert('Thank you! We\'ll get back to you soon.');">
        <div class="grid sm:grid-cols-2 gap-4">
          <input type="text" placeholder="Your name" required class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm placeholder-gray-400 outline-none focus:border-gray-400 transition-colors">
          <input type="email" placeholder="Email address" required class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm placeholder-gray-400 outline-none focus:border-gray-400 transition-colors">
        </div>
        <select class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-500 outline-none focus:border-gray-400 transition-colors bg-white">
          <option>Select a topic</option>
          <option>Order enquiry</option>
          <option>Sizing help</option>
          <option>Returns & exchanges</option>
          <option>Collaboration</option>
          <option>Other</option>
        </select>
        <textarea rows="5" placeholder="Your message" required class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm placeholder-gray-400 outline-none focus:border-gray-400 transition-colors resize-none"></textarea>
        <button type="submit" class="bg-gray-900 text-white text-xs font-medium tracking-wider uppercase px-8 py-3.5 rounded hover:bg-gray-800 transition-colors">Send Message</button>
      </form>
    </div>
  </main>

  <div id="footer-mount"></div>
  <script src="js/product-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
