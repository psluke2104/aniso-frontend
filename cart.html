<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="brand_assets/favicon.png" type="image/png">
  <title>Your Bag — ANISO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { cocoa: '#8B6147', blush: '#E8B4A0', champagne: '#D4B896' },
          fontFamily: { display: ['Playfair Display', 'Georgia', 'serif'], body: ['Montserrat', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .animate-scroll { animation: scroll 25s linear infinite; }
  </style>
</head>
<body class="bg-white font-body text-gray-900">

  <div id="nav-mount"></div>

  <main>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8 md:py-12">
      <div class="grid md:grid-cols-3 gap-8 md:gap-12">
        <!-- Cart Items -->
        <div class="md:col-span-2">
          <h1 class="font-display text-2xl sm:text-3xl mb-6">Your Bag</h1>
          <div id="cartItems"></div>
        </div>

        <!-- Order Summary -->
        <div>
          <div class="bg-gray-50 rounded-lg p-6 sticky top-24">
            <h2 class="font-display text-lg mb-4">Order Summary</h2>
            <div class="space-y-3 text-sm">
              <div class="flex justify-between">
                <span class="text-gray-600">Subtotal</span>
                <span class="font-medium" id="cartSubtotal">₹0</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-600">Shipping</span>
                <span class="font-medium" id="cartShipping">—</span>
              </div>
              <p class="text-xs text-cocoa" id="cartShippingNote"></p>
              <div class="flex justify-between pt-3 border-t border-gray-200 text-base font-medium">
                <span>Total</span>
                <span id="cartTotal">₹0</span>
              </div>
            </div>

            <a href="checkout.html" class="block w-full text-center bg-gray-900 text-white text-xs font-medium tracking-wider uppercase py-4 rounded mt-6 hover:bg-gray-800 transition-colors">
              Proceed to Checkout
              <svg class="inline ml-1" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
            <a href="shop.html" class="block text-center text-xs text-gray-500 mt-3 hover:text-gray-900 transition-colors">&larr; Continue Shopping</a>

            <!-- Trust -->
            <div class="mt-6 pt-4 border-t border-gray-200 space-y-2">
              <div class="flex items-center gap-2 text-xs text-gray-500">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Secure, encrypted checkout
              </div>
              <div class="flex items-center gap-2 text-xs text-gray-500">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.02"/></svg>
                14-day hassle-free returns
              </div>
              <div class="flex items-center gap-2 text-xs text-gray-500">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 4v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                Free shipping above ₹1,499
              </div>
            </div>

            <!-- Payment badges -->
            <div class="mt-4 flex gap-2 flex-wrap">
              <span class="text-[10px] border border-gray-300 rounded px-2 py-0.5 text-gray-500">UPI</span>
              <span class="text-[10px] border border-gray-300 rounded px-2 py-0.5 text-gray-500">Visa</span>
              <span class="text-[10px] border border-gray-300 rounded px-2 py-0.5 text-gray-500">Mastercard</span>
              <span class="text-[10px] border border-gray-300 rounded px-2 py-0.5 text-gray-500">COD</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="js/product-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
</body>
</html>
